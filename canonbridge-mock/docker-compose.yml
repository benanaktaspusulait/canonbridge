version: "3.8"

name: canonbridge-mock

services:
  wiremock:
    build: ./wiremock
    ports:
      - "8080:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro

  soap-mock:
    build: ./soap-mock
    ports:
      - "8081:8080"
    volumes:
      - ./soap-mock/mappings:/home/wiremock/mappings:ro
      - ./soap-mock/wsdl:/home/wiremock/__files/wsdl:ro

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/bash", "-lc"]
    command: "/scripts/init-kafka.sh"

  webhook-receiver:
    build: ./webhook-receiver
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      WEBHOOK_STORAGE_DIR: /app/webhooks
    volumes:
      - ./webhook-receiver/webhooks:/app/webhooks

  event-generator:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/bash", "-lc"]
    command: "while true; do /scripts/send-mock-events.sh shopmax; sleep 30; done"

  cargo-poller:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/bash", "-lc"]
    command: "while true; do /scripts/send-mock-events.sh cargo; sleep 120; done"

volumes:
  kafka-data:

