# ============================================================================
# SECRETS EXAMPLE - DO NOT COMMIT REAL VALUES
# ============================================================================
# Copy this file to secrets.yaml and fill in real values, or better yet,
# use External Secrets Operator / SealedSecrets / SOPS for production.
#
# kubectl create secret generic postgres-secret \
#   --from-literal=POSTGRES_DB=etldb \
#   --from-literal=POSTGRES_USER=etluser \
#   --from-literal=POSTGRES_PASSWORD=<STRONG_PASSWORD> \
#   --from-literal=DB_PASSWORD=<STRONG_PASSWORD> \
#   -n canonbridge
#
# kubectl create secret generic redis-secret \
#   --from-literal=REDIS_PASSWORD=<STRONG_PASSWORD> \
#   -n canonbridge
#
# kubectl create secret generic jwt-secret \
#   --from-literal=JWT_SECRET=<STRONG_SECRET> \
#   --from-literal=API_KEY_SALT=<STRONG_SALT> \
#   -n canonbridge
#
# Image pull secret for private registry:
# kubectl create secret docker-registry registry-credentials \
#   --docker-server=<REGISTRY_URL> \
#   --docker-username=<USERNAME> \
#   --docker-password=<PASSWORD> \
#   --docker-email=<EMAIL> \
#   -n canonbridge
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: canonbridge
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: canonbridge
type: Opaque
stringData:
  POSTGRES_DB: ""
  POSTGRES_USER: ""
  POSTGRES_PASSWORD: ""
  DB_PASSWORD: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: canonbridge
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: canonbridge
type: Opaque
stringData:
  REDIS_PASSWORD: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: canonbridge
  labels:
    app.kubernetes.io/name: jwt
    app.kubernetes.io/part-of: canonbridge
type: Opaque
stringData:
  JWT_SECRET: ""
  API_KEY_SALT: ""

---
# Image pull secret for private container registry (K9)
# Create with: kubectl create secret docker-registry registry-credentials ...
# Or use the manifest below with base64-encoded .dockerconfigjson
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: canonbridge
  labels:
    app.kubernetes.io/name: registry-credentials
    app.kubernetes.io/part-of: canonbridge
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: ""
