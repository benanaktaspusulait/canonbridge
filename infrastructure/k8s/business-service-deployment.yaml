apiVersion: v1
kind: Service
metadata:
  name: business-service
  namespace: canonbridge
  labels:
    app: business-service
    app.kubernetes.io/name: business-service
    app.kubernetes.io/part-of: canonbridge
spec:
  ports:
    - port: 8080
      name: http
      targetPort: 8080
  selector:
    app: business-service
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-service
  namespace: canonbridge
  labels:
    app: business-service
    app.kubernetes.io/name: business-service
    app.kubernetes.io/part-of: canonbridge
spec:
  replicas: 3
  selector:
    matchLabels:
      app: business-service
  template:
    metadata:
      labels:
        app: business-service
        app.kubernetes.io/name: business-service
        app.kubernetes.io/part-of: canonbridge
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/q/metrics"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: business-service
      containers:
        - name: business-service
          image: canonbridge/business-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: business-service-config
          env:
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_PASSWORD
            # JVM tuning (R2)
            - name: JAVA_OPTS_APPEND
              value: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:+AlwaysPreTouch -XX:+UseStringDeduplication"
            # OpenTelemetry (O5)
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.canonbridge.svc.cluster.local:4318"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              # CPU limits removed (R1) - CFS throttling antipattern
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

---
# HPA (R5 - removed memory metric, use only CPU)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: business-service-hpa
  namespace: canonbridge
  labels:
    app.kubernetes.io/name: business-service
    app.kubernetes.io/part-of: canonbridge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: business-service
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60

---
# PodDisruptionBudget (A4)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: business-service-pdb
  namespace: canonbridge
  labels:
    app: business-service
    app.kubernetes.io/name: business-service
    app.kubernetes.io/part-of: canonbridge
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: business-service
