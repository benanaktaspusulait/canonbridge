---
# Allow prometheus → all pods /metrics + otel-collector prometheus port
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: canonbridge
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - port: 8080
          protocol: TCP
        - port: 8889
          protocol: TCP
        - port: 9090
          protocol: TCP

---
# Allow ingress to otel-collector from all pods in namespace (for telemetry)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-otel-collector
  namespace: canonbridge
spec:
  podSelector:
    matchLabels:
      app: otel-collector
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP

---
# Allow ingress to business-service and transformer from edge/ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-services
  namespace: canonbridge
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [business-service, transformer, webhook-receiver]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - port: 8080
          protocol: TCP

