# Default deny all ingress/egress in the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: canonbridge
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow transformer → kafka + postgres + otel-collector
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-transformer-egress
  namespace: canonbridge
spec:
  podSelector:
    matchLabels:
      app: transformer
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - port: 9092
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

