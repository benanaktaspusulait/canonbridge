apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: transformer-hpa
  namespace: canonbridge
  labels:
    app: transformer
    app.kubernetes.io/name: transformer
    app.kubernetes.io/part-of: canonbridge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: transformer
  minReplicas: 3
  maxReplicas: 20
  metrics:
    # R5: Only CPU metric - memory is antipattern for GC-based runtimes
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
