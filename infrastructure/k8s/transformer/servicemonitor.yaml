# ServiceMonitor for Prometheus Operator
# Requires Prometheus Operator to be installed in the cluster
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: transformer
  namespace: canonbridge
  labels:
    app: transformer
    app.kubernetes.io/name: transformer
    app.kubernetes.io/part-of: canonbridge
    # O4: Use standard label that kube-prometheus-stack expects
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: transformer
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - canonbridge
