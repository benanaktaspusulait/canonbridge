apiVersion: v1
kind: Secret
metadata:
  name: transformer-secret
  namespace: canonbridge
  labels:
    app: transformer
type: Opaque
stringData:
  # API Key for HTTP endpoints (base64 encoded in production)
  API_KEY: "change-me-in-production"
  
  # Kafka SASL credentials (if SASL enabled)
  KAFKA_SASL_USERNAME: ""
  KAFKA_SASL_PASSWORD: ""
---
# Example: Create secret from literal values
# kubectl create secret generic transformer-secret \
#   --from-literal=API_KEY=your-secure-api-key \
#   --from-literal=KAFKA_SASL_USERNAME=your-kafka-user \
#   --from-literal=KAFKA_SASL_PASSWORD=your-kafka-password \
#   -n canonbridge
