apiVersion: apps/v1
kind: Deployment
metadata:
  name: transformer
  namespace: canonbridge
  labels:
    app: transformer
    app.kubernetes.io/name: transformer
    app.kubernetes.io/part-of: canonbridge
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: transformer
  template:
    metadata:
      labels:
        app: transformer
        app.kubernetes.io/name: transformer
        app.kubernetes.io/part-of: canonbridge
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Anti-affinity to spread pods across nodes and zones (A5)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - transformer
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: transformer
      
      containers:
        - name: transformer
          image: canonbridge/transformer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          
          envFrom:
            - configMapRef:
                name: transformer-config
          
          env:
            # K10: optional: false - pod must fail-fast if secret is missing
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: transformer-secret
                  key: API_KEY
                  optional: false
            - name: KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: transformer-secret
                  key: KAFKA_SASL_USERNAME
                  optional: true
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: transformer-secret
                  key: KAFKA_SASL_PASSWORD
                  optional: true
          
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              # CPU limits removed (R1) - CFS throttling antipattern
          
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          
          # A7: Separate liveness (process only) from readiness (dependencies)
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          
          volumeMounts:
            - name: mappings
              mountPath: /mappings
              readOnly: true
            - name: tmp
              mountPath: /tmp
      
      volumes:
        - name: mappings
          configMap:
            name: mappings-config
            optional: true
        - name: tmp
          emptyDir: {}
      
      # Graceful shutdown
      terminationGracePeriodSeconds: 60
