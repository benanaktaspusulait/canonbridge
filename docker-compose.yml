services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: canonbridge-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: canonbridge-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: canonbridge-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVER: kafka:29092
    volumes:
      - ./infrastructure/docker/kafka/create-topics.sh:/create-topics.sh:ro
    command: ["bash", "/create-topics.sh"]
    restart: "no"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: canonbridge-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    profiles:
      - schema-registry

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: canonbridge-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      # Only active when schema-registry profile is enabled (docker compose --profile schema-registry up)
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  postgres:
    image: postgres:15-alpine
    container_name: canonbridge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-canonbridge_db}
      POSTGRES_USER: ${POSTGRES_USER:-canonbridge_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env file}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-canonbridge_user} -d ${POSTGRES_DB:-canonbridge_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: canonbridge-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  mapping-studio-api:
    build:
      context: ./services/mapping-studio-api
      dockerfile: Dockerfile
    image: canonbridge/mapping-studio-api:latest
    container_name: canonbridge-mapping-studio-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      DB_USERNAME: ${POSTGRES_USER:-canonbridge_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env file}
      DB_URL: postgresql://postgres:5432/${POSTGRES_DB:-canonbridge_db}
      JDBC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-canonbridge_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECURITY_FAIL_ON_INSECURE_DEFAULTS: ${SECURITY_FAIL_ON_INSECURE_DEFAULTS:-true}
      SECURITY_PRODUCTION_REQUIRES_OIDC: ${SECURITY_PRODUCTION_REQUIRES_OIDC:-true}
      SECURITY_REQUIRE_OIDC_CLIENT_SECRET: ${SECURITY_REQUIRE_OIDC_CLIENT_SECRET:-true}
      CANONBRIDGE_PRODUCTION_ALLOWS_LOCAL_LOGIN: ${CANONBRIDGE_PRODUCTION_ALLOWS_LOCAL_LOGIN:-false}
      CANONBRIDGE_AUTH_ENABLED: ${CANONBRIDGE_AUTH_ENABLED:-true}
      CANONBRIDGE_API_KEY_AUTH_ENABLED: ${CANONBRIDGE_API_KEY_AUTH_ENABLED:-true}
      CANONBRIDGE_BEARER_API_KEY_ENABLED: ${CANONBRIDGE_BEARER_API_KEY_ENABLED:-false}
      CANONBRIDGE_LOCAL_JWT_ENABLED: ${CANONBRIDGE_LOCAL_JWT_ENABLED:-true}
      CANONBRIDGE_LOCAL_LOGIN_ENABLED: ${CANONBRIDGE_LOCAL_LOGIN_ENABLED:-true}
      CANONBRIDGE_PUBLIC_DOCS_ENABLED: ${CANONBRIDGE_PUBLIC_DOCS_ENABLED:-false}
      CANONBRIDGE_API_KEYS: ${CANONBRIDGE_API_KEYS:?CANONBRIDGE_API_KEYS must be set in .env file}
      CANONBRIDGE_CREDENTIAL_ENCRYPTION_KEY: ${CANONBRIDGE_CREDENTIAL_ENCRYPTION_KEY:?CANONBRIDGE_CREDENTIAL_ENCRYPTION_KEY must be set in .env file}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_SERVER_URL: ${OIDC_SERVER_URL:-http://localhost:8180/realms/canonbridge}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-mapping-studio}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:3000}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-canonbridge-jwt-secret-key-for-development-only-change-in-production}
      JWT_ISSUER: ${JWT_ISSUER:-canonbridge}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-28800}
      CANONBRIDGE_TRANSFORMER_URL: ${CANONBRIDGE_TRANSFORMER_URL:-http://transformer:8080}
      RATELIMIT_ENABLED: ${RATELIMIT_ENABLED:-false}
      CANONBRIDGE_RATELIMIT_ENABLED: ${RATELIMIT_ENABLED:-false}
      SCHEDULED_POLLER_ENABLED: ${SCHEDULED_POLLER_ENABLED:-true}
      SCHEDULED_POLLER_TICK_SECONDS: ${SCHEDULED_POLLER_TICK_SECONDS:-60}
      SCHEDULED_POLLER_DEFAULT_INTERVAL: ${SCHEDULED_POLLER_DEFAULT_INTERVAL:-PT15M}
      OUTBOX_REPLAY_ENABLED: ${OUTBOX_REPLAY_ENABLED:-true}
      OUTBOX_REPLAY_TICK_SECONDS: ${OUTBOX_REPLAY_TICK_SECONDS:-30}
      OUTBOX_REPLAY_BATCH_SIZE: ${OUTBOX_REPLAY_BATCH_SIZE:-50}
      OUTBOX_REPLAY_MAX_ATTEMPTS: ${OUTBOX_REPLAY_MAX_ATTEMPTS:-10}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  transformer:
    build:
      context: ./services/transformer
      dockerfile: Dockerfile
    image: canonbridge/transformer:latest
    container_name: canonbridge-transformer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8083:8080"
    environment:
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:29092}
      KAFKA_GROUP_ID: "canonbridge-transformer"
      KAFKA_FALLBACK_DLQ_TOPIC: "transformation.dlq"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OUTBOX_ENABLED: "false"
      LOG_LEVEL: "info"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  webhook-receiver:
    build:
      context: ./services/webhook-receiver
      dockerfile: Dockerfile
    image: canonbridge/webhook-receiver:latest
    container_name: canonbridge-webhook-receiver
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mapping-studio-api:
        condition: service_healthy
    ports:
      - "8084:8082"
    environment:
      DB_USERNAME: ${POSTGRES_USER:-canonbridge_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env file}
      DB_URL: postgresql://postgres:5432/${POSTGRES_DB:-canonbridge_db}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/q/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mapping-studio-ui:
    build:
      context: ./mapping-studio-ui
      dockerfile: Dockerfile
    image: canonbridge/mapping-studio-ui:latest
    container_name: canonbridge-mapping-studio-ui
    ports:
      - "4200:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  canonbridge-mock:
    build:
      context: ./services/canonbridge-mock
      dockerfile: Dockerfile
    image: canonbridge/canonbridge-mock:latest
    container_name: canonbridge-mock
    ports:
      - "8085:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYFLEX_API_KEY: demo-api-key-12345
      SHOPMAX_CLIENT_ID: shopmax-demo-client
      SHOPMAX_CLIENT_SECRET: shopmax-demo-secret
      FASTCARGO_USERNAME: fastcargo-demo
      FASTCARGO_PASSWORD: fastcargo-secret
      WEBHOOK_STORAGE_DIR: /tmp/webhooks
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - webhook-data:/tmp/webhooks

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: canonbridge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/docker/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: canonbridge-postgres-exporter
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-canonbridge_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-canonbridge_db}?sslmode=disable"

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: canonbridge-redis-exporter
    depends_on:
      - redis
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis://redis:6379"

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: canonbridge-kafka-exporter
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka:29092"

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: canonbridge-node-exporter
    ports:
      - "9100:9100"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: canonbridge-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set in .env file}
      GF_SECURITY_ALLOW_EMBEDDING: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
    volumes:
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  webhook-data:
