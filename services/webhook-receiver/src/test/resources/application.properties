quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=test
quarkus.datasource.password=test
quarkus.datasource.reactive.url=postgresql://localhost:5432/testdb

kafka.bootstrap.servers=localhost:9092
mp.messaging.outgoing.raw-events.connector=smallrye-kafka
mp.messaging.outgoing.raw-events.topic=raw-partner-events
mp.messaging.outgoing.raw-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.raw-events.key.serializer=org.apache.kafka.common.serialization.StringSerializer

quarkus.log.level=WARN
quarkus.log.console.json=false
