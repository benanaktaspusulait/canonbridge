# Application
quarkus.application.name=webhook-receiver
quarkus.application.version=1.0.0

# HTTP
quarkus.http.port=8082
# WR-V1-M4 FIX: Lowered from 10M to 2M (sufficient for webhooks, prevents memory bomb)
quarkus.http.limits.max-body-size=${HTTP_MAX_BODY_SIZE:2M}

# Kafka Producer
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Kafka Security (X-Y2: SASL_SCRAM support for production)
kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
kafka.sasl.mechanism=${KAFKA_SASL_MECHANISM:}
kafka.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:}
mp.messaging.outgoing.raw-events.connector=smallrye-kafka
mp.messaging.outgoing.raw-events.topic=partner.raw.events
mp.messaging.outgoing.raw-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.raw-events.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.raw-events.acks=all
mp.messaging.outgoing.raw-events.enable.idempotence=true
mp.messaging.outgoing.raw-events.retries=${KAFKA_PRODUCER_RETRIES:10}
mp.messaging.outgoing.raw-events.compression.type=${KAFKA_PRODUCER_COMPRESSION:lz4}

# Usage events (billing metering)
mp.messaging.outgoing.usage-events.connector=smallrye-kafka
mp.messaging.outgoing.usage-events.topic=usage.events
mp.messaging.outgoing.usage-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.usage-events.key.serializer=org.apache.kafka.common.serialization.StringSerializer

# Reactive PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.reactive.url=${DB_URL:postgresql://localhost:5432/canonbridge}

# Redis (for distributed rate limiting)
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}

# Logging
quarkus.log.level=INFO
quarkus.log.console.json=true
quarkus.log.console.json.additional-field."service".value=webhook-receiver

# Rate Limiting (W-Y3)
canonbridge.webhook.ratelimit.enabled=${WEBHOOK_RATE_LIMIT_ENABLED:true}
canonbridge.webhook.ratelimit.max-requests=${WEBHOOK_RATE_LIMIT_MAX_REQUESTS:100}
canonbridge.webhook.ratelimit.window-seconds=${WEBHOOK_RATE_LIMIT_WINDOW_SECONDS:60}

# Health
quarkus.health.extensions.enabled=true

# OpenTelemetry (X-Y3)
quarkus.otel.enabled=${OTEL_ENABLED:false}
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.exporter.otlp.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:grpc}
quarkus.otel.resource.attributes=service.name=${quarkus.application.name},deployment.environment=${ENVIRONMENT:development}
%prod.quarkus.otel.enabled=${OTEL_ENABLED:true}
%dev.quarkus.otel.enabled=false
%test.quarkus.otel.enabled=false

# Metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
