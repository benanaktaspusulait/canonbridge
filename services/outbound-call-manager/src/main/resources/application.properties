# Application
quarkus.application.name=outbound-call-manager
quarkus.application.version=1.0.0

# HTTP
quarkus.http.port=8081
quarkus.http.cors=true

# Reactive PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.reactive.url=${DB_URL:postgresql://localhost:5432/canonbridge}
quarkus.datasource.reactive.max-size=20
quarkus.datasource.reactive.idle-timeout=PT10M

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration

# Logging
quarkus.log.level=INFO
quarkus.log.console.json=true
quarkus.log.console.json.additional-field."service".value=outbound-call-manager

# Health
quarkus.health.extensions.enabled=true
quarkus.smallrye-health.root-path=/health

# Metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true

# HTTP Client
quarkus.rest-client.connect-timeout=5000
quarkus.rest-client.read-timeout=30000

# Fault Tolerance
quarkus.fault-tolerance.enabled=true

# Outbound Call Settings
outbound.default-timeout-ms=30000
outbound.max-retries=3
outbound.circuit-breaker-failure-threshold=5
outbound.circuit-breaker-delay-ms=60000
outbound.allow-private-ips=false
outbound.url-allowlist=${OUTBOUND_URL_ALLOWLIST:}
