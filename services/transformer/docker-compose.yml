services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.5
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"

  transformer:
    build: .
    ports:
      - "8080:8080"
    environment:
      MAPPINGS_ROOT: /mappings
      PORT: "8080"
      LOG_LEVEL: info
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: redpanda:9092
      KAFKA_GROUP_ID: canonbridge-transformer
    volumes:
      - ../../mappings:/mappings:ro
    depends_on:
      - redpanda
