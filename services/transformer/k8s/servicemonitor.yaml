# ServiceMonitor for Prometheus Operator
# Requires Prometheus Operator to be installed in the cluster
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: transformer
  namespace: canonbridge
  labels:
    app: transformer
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app: transformer
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - canonbridge
