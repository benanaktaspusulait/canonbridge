apiVersion: v1
kind: Service
metadata:
  name: transformer
  namespace: canonbridge
  labels:
    app: transformer
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: transformer
  sessionAffinity: None
---
# Headless service for StatefulSet (if needed for Kafka consumer coordination)
apiVersion: v1
kind: Service
metadata:
  name: transformer-headless
  namespace: canonbridge
  labels:
    app: transformer
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: transformer
