# Test configuration for Mapping Studio API

# Use test database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/canonbridge_test
quarkus.datasource.reactive.url=postgresql://localhost:5432/canonbridge_test
quarkus.flyway.migrate-at-start=false

# Use test Redis
quarkus.redis.hosts=redis://localhost:6379

# Disable auth for tests
canonbridge.auth.enabled=false
quarkus.oidc.enabled=false
quarkus.oidc.tenant-enabled=false
quarkus.keycloak.devservices.enabled=false

# Enable rate limiting for tests
canonbridge.ratelimit.enabled=true
canonbridge.ratelimit.authenticated.default-limit=100
canonbridge.ratelimit.authenticated.window-seconds=60
canonbridge.ratelimit.unauthenticated.default-limit=10
canonbridge.ratelimit.unauthenticated.window-seconds=60

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.canonbridge".level=DEBUG
