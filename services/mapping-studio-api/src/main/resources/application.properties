# Application
quarkus.application.name=mapping-studio-api
quarkus.application.version=1.0.0

# HTTP
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-tenant-id,x-correlation-id

# Reactive PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.reactive.url=${DB_URL:postgresql://localhost:5432/canonbridge}
quarkus.datasource.reactive.max-size=20
quarkus.datasource.reactive.idle-timeout=PT10M
quarkus.datasource.reactive.cache-prepared-statements=true

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=classpath:db/migration

# Logging
quarkus.log.level=INFO
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.additional-field."service".value=mapping-studio-api

# Health
quarkus.health.extensions.enabled=true
quarkus.smallrye-health.root-path=/health

# Metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Security (placeholder for OIDC)
quarkus.security.auth.enabled-in-dev-mode=false
# quarkus.oidc.auth-server-url=${OIDC_SERVER_URL}
# quarkus.oidc.client-id=${OIDC_CLIENT_ID}
# quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET}

# Tenant context
canonbridge.tenant.header-name=X-Tenant-Id
canonbridge.tenant.required=true

# Correlation ID
canonbridge.correlation.header-name=X-Correlation-Id
