# Application
quarkus.application.name=mapping-studio-api
quarkus.application.version=1.0.0

# HTTP
quarkus.http.port=8080
quarkus.http.limits.max-body-size=${HTTP_MAX_BODY_SIZE:1M}
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-tenant-id,x-user-id,x-correlation-id,x-api-key
quarkus.http.cors.exposed-headers=X-Correlation-Id,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset
quarkus.http.cors.access-control-max-age=24H

# Reactive PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${JDBC_DB_URL:jdbc:postgresql://localhost:5432/canonbridge}
quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:5}
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:20}
quarkus.datasource.reactive.url=${DB_URL:postgresql://localhost:5432/canonbridge}
quarkus.datasource.reactive.max-size=${DB_POOL_MAX_SIZE:20}
quarkus.datasource.reactive.idle-timeout=${DB_POOL_IDLE_TIMEOUT:PT5M}
quarkus.datasource.reactive.cache-prepared-statements=true

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.out-of-order=true

# Logging
quarkus.log.level=INFO
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.additional-field."service".value=mapping-studio-api
quarkus.log.console.json.additional-field."environment".value=${ENVIRONMENT:development}

# Health
quarkus.health.extensions.enabled=true
quarkus.smallrye-health.root-path=/health

# Metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=${SWAGGER_UI_ENABLED:false}
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Security
quarkus.security.auth.enabled-in-dev-mode=false
quarkus.http.auth.proactive=false
canonbridge.security.environment=${ENVIRONMENT:development}
canonbridge.security.fail-on-insecure-defaults=${SECURITY_FAIL_ON_INSECURE_DEFAULTS:true}
canonbridge.security.production-requires-oidc=${SECURITY_PRODUCTION_REQUIRES_OIDC:true}
canonbridge.security.require-oidc-client-secret=${SECURITY_REQUIRE_OIDC_CLIENT_SECRET:true}
canonbridge.security.production-allows-local-login=${CANONBRIDGE_PRODUCTION_ALLOWS_LOCAL_LOGIN:false}
quarkus.oidc.enabled=${OIDC_ENABLED:false}
quarkus.oidc.auth-server-url=${OIDC_SERVER_URL:http://localhost:8180/realms/canonbridge}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:mapping-studio}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:}
quarkus.oidc.application-type=service
canonbridge.auth.enabled=${CANONBRIDGE_AUTH_ENABLED:true}
canonbridge.auth.api-key.enabled=${CANONBRIDGE_API_KEY_AUTH_ENABLED:true}
canonbridge.auth.api-key-header=X-API-Key
canonbridge.auth.api-keys=${CANONBRIDGE_API_KEYS:dev-api-key}
canonbridge.auth.bearer-api-key.enabled=${CANONBRIDGE_BEARER_API_KEY_ENABLED:false}
canonbridge.auth.local-jwt.enabled=${CANONBRIDGE_LOCAL_JWT_ENABLED:true}
canonbridge.auth.local-login.enabled=${CANONBRIDGE_LOCAL_LOGIN_ENABLED:true}
canonbridge.auth.public-docs.enabled=${CANONBRIDGE_PUBLIC_DOCS_ENABLED:false}
%dev.canonbridge.auth.public-docs.enabled=true
%test.canonbridge.auth.public-docs.enabled=true
canonbridge.rbac.enabled=${CANONBRIDGE_RBAC_ENABLED:true}

# Tenant context
canonbridge.tenant.default-id=${CANONBRIDGE_TENANT_ID:tenant-acme}
canonbridge.tenant.single-tenant.enabled=${CANONBRIDGE_SINGLE_TENANT:true}
canonbridge.tenant.isolation.enabled=${CANONBRIDGE_TENANT_ISOLATION:true}
canonbridge.tenant.mappings=${CANONBRIDGE_TENANT_MAPPINGS:}
canonbridge.credentials.encryption-key=${CANONBRIDGE_CREDENTIAL_ENCRYPTION_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

# JWT Configuration - Using HMAC256 for development
mp.jwt.verify.issuer=canonbridge
smallrye.jwt.sign.key=${JWT_SECRET_KEY:canonbridge-jwt-secret-key-for-development-only-change-in-production}
mp.jwt.verify.publickey.algorithm=HS256
canonbridge.jwt.secret=${JWT_SECRET_KEY:canonbridge-jwt-secret-key-for-development-only-change-in-production}
canonbridge.jwt.issuer=${JWT_ISSUER:canonbridge}
canonbridge.jwt.ttl-seconds=${JWT_TTL_SECONDS:28800}

# Tenant header
canonbridge.tenant.header-name=X-Tenant-Id
canonbridge.tenant.required=true

# Correlation ID
canonbridge.correlation.header-name=X-Correlation-Id

# Graceful Shutdown
quarkus.shutdown.timeout=30s
canonbridge.shutdown.drain-timeout-seconds=${SHUTDOWN_DRAIN_TIMEOUT:30}
canonbridge.shutdown.producer-flush-timeout-seconds=${SHUTDOWN_PRODUCER_FLUSH_TIMEOUT:10}

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
quarkus.redis.timeout=10s
quarkus.redis.max-pool-size=${REDIS_MAX_POOL_SIZE:10}
quarkus.redis.max-pool-waiting=50
canonbridge.http-client.max-connections-per-host=${HTTP_CLIENT_MAX_CONNECTIONS_PER_HOST:50}

# Rate Limiting
canonbridge.ratelimit.enabled=${RATE_LIMIT_ENABLED:true}
canonbridge.ratelimit.authenticated.default-limit=100
canonbridge.ratelimit.authenticated.window-seconds=60
canonbridge.ratelimit.unauthenticated.default-limit=10
canonbridge.ratelimit.unauthenticated.window-seconds=60
canonbridge.ratelimit.redis-key-prefix=ratelimit:

# Circuit Breaker
canonbridge.circuit-breaker.failure-ratio=${CIRCUIT_BREAKER_FAILURE_RATIO:0.5}
canonbridge.circuit-breaker.delay-seconds=${CIRCUIT_BREAKER_DELAY_SECONDS:30}
canonbridge.circuit-breaker.request-volume-threshold=${CIRCUIT_BREAKER_REQUEST_VOLUME:10}

# Transformer HTTP API for backend-side JSONata request rendering
canonbridge.transformer.url=${CANONBRIDGE_TRANSFORMER_URL:http://localhost:8083}

# Scheduled API poller
canonbridge.scheduled-poller.enabled=${SCHEDULED_POLLER_ENABLED:true}
canonbridge.scheduled-poller.tick-seconds=${SCHEDULED_POLLER_TICK_SECONDS:60}
canonbridge.scheduled-poller.default-interval=${SCHEDULED_POLLER_DEFAULT_INTERVAL:PT15M}

# Outbox replay
canonbridge.outbox.replay.enabled=${OUTBOX_REPLAY_ENABLED:true}
canonbridge.outbox.replay.tick-seconds=${OUTBOX_REPLAY_TICK_SECONDS:30}
canonbridge.outbox.replay.batch-size=${OUTBOX_REPLAY_BATCH_SIZE:50}
canonbridge.outbox.replay.max-attempts=${OUTBOX_REPLAY_MAX_ATTEMPTS:10}

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.outgoing.canonical-events.connector=smallrye-kafka
mp.messaging.outgoing.canonical-events.topic=canonical.events
mp.messaging.outgoing.canonical-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.canonical-events.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.raw-events.connector=smallrye-kafka
mp.messaging.incoming.raw-events.topic=${KAFKA_RAW_TOPIC:partner.raw.events}
mp.messaging.incoming.raw-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.raw-events.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.raw-events.group.id=mapping-studio-api
mp.messaging.incoming.raw-events.auto.offset.reset=earliest
