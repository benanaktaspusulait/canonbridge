# Application
quarkus.application.name=mapping-studio-api
quarkus.application.version=1.0.0

# HTTP
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-tenant-id,x-user-id,x-correlation-id,x-api-key

# Reactive PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${JDBC_DB_URL:jdbc:postgresql://localhost:5432/canonbridge}
quarkus.datasource.reactive.url=${DB_URL:postgresql://localhost:5432/canonbridge}
quarkus.datasource.reactive.max-size=20
quarkus.datasource.reactive.idle-timeout=PT10M
quarkus.datasource.reactive.cache-prepared-statements=true

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.out-of-order=true

# Logging
quarkus.log.level=INFO
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.additional-field."service".value=mapping-studio-api

# Health
quarkus.health.extensions.enabled=true
quarkus.smallrye-health.root-path=/health

# Metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Security
quarkus.security.auth.enabled-in-dev-mode=false
quarkus.http.auth.proactive=false
quarkus.oidc.enabled=false
canonbridge.auth.enabled=${CANONBRIDGE_AUTH_ENABLED:true}
canonbridge.auth.api-key-header=X-API-Key
canonbridge.auth.api-keys=${CANONBRIDGE_API_KEYS:dev-api-key}
canonbridge.credentials.encryption-key=${CANONBRIDGE_CREDENTIAL_ENCRYPTION_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
# quarkus.oidc.auth-server-url=${OIDC_SERVER_URL}
# quarkus.oidc.client-id=${OIDC_CLIENT_ID}
# quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET}

# JWT Configuration - Using HMAC256 for development
mp.jwt.verify.issuer=canonbridge
smallrye.jwt.sign.key=${JWT_SECRET_KEY:canonbridge-jwt-secret-key-for-development-only-change-in-production}
mp.jwt.verify.publickey.algorithm=HS256

# Tenant context
canonbridge.tenant.header-name=X-Tenant-Id
canonbridge.tenant.required=true

# Correlation ID
canonbridge.correlation.header-name=X-Correlation-Id

# Graceful Shutdown
canonbridge.shutdown.drain-timeout-seconds=${SHUTDOWN_DRAIN_TIMEOUT:30}
canonbridge.shutdown.producer-flush-timeout-seconds=${SHUTDOWN_PRODUCER_FLUSH_TIMEOUT:10}

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
quarkus.redis.timeout=10s
quarkus.redis.max-pool-size=20
quarkus.redis.max-pool-waiting=50

# Rate Limiting
canonbridge.ratelimit.enabled=${RATELIMIT_ENABLED:false}
canonbridge.ratelimit.authenticated.default-limit=100
canonbridge.ratelimit.authenticated.window-seconds=60
canonbridge.ratelimit.unauthenticated.default-limit=10
canonbridge.ratelimit.unauthenticated.window-seconds=60
canonbridge.ratelimit.redis-key-prefix=ratelimit:

# Circuit Breaker
canonbridge.circuit-breaker.failure-ratio=${CIRCUIT_BREAKER_FAILURE_RATIO:0.5}
canonbridge.circuit-breaker.delay-seconds=${CIRCUIT_BREAKER_DELAY_SECONDS:30}
canonbridge.circuit-breaker.request-volume-threshold=${CIRCUIT_BREAKER_REQUEST_VOLUME:10}

# Transformer HTTP API for backend-side JSONata request rendering
canonbridge.transformer.url=${CANONBRIDGE_TRANSFORMER_URL:http://localhost:8083}

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.outgoing.canonical-events.connector=smallrye-kafka
mp.messaging.outgoing.canonical-events.topic=canonical.events
mp.messaging.outgoing.canonical-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.canonical-events.key.serializer=org.apache.kafka.common.serialization.StringSerializer
