# CanonBridge Billing Service
quarkus.application.name=billing-service

# HTTP
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}
%prod.quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS}

# Database (shared with mapping-studio-api)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:canonbridge_db}
quarkus.datasource.username=${DB_USERNAME:canonbridge_user}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:canonbridge_db}

# Flyway — billing-service does NOT run migrations (mapping-studio-api owns the schema)
quarkus.flyway.migrate-at-start=false

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Kafka Security (X-Y2: SASL_SCRAM support for production)
kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
kafka.sasl.mechanism=${KAFKA_SASL_MECHANISM:}
kafka.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:}

# Incoming: usage events from all services
mp.messaging.incoming.usage-events-in.connector=smallrye-kafka
mp.messaging.incoming.usage-events-in.topic=usage.events
mp.messaging.incoming.usage-events-in.group.id=billing-service
mp.messaging.incoming.usage-events-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.usage-events-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.usage-events-in.auto.offset.reset=earliest
mp.messaging.incoming.usage-events-in.enable.auto.commit=false

# Outgoing: billing events (subscription changes, invoice created, etc.)
mp.messaging.outgoing.billing-events-out.connector=smallrye-kafka
mp.messaging.outgoing.billing-events-out.topic=billing.events
mp.messaging.outgoing.billing-events-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.billing-events-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.billing-events-out.acks=all
mp.messaging.outgoing.billing-events-out.enable.idempotence=true

# Paddle Configuration
canonbridge.paddle.api-key=${PADDLE_API_KEY:}
canonbridge.paddle.webhook-secret=${PADDLE_WEBHOOK_SECRET:}
canonbridge.paddle.environment=${PADDLE_ENVIRONMENT:sandbox}
canonbridge.paddle.seller-id=${PADDLE_SELLER_ID:}
canonbridge.paddle.base-url=${PADDLE_BASE_URL:https://sandbox-api.paddle.com}

# Usage Aggregation Cron
canonbridge.billing.usage-aggregation-cron=${USAGE_AGGREGATION_CRON:0 0 2 * * ?}
canonbridge.billing.usage-reconciliation-cron=${USAGE_RECONCILIATION_CRON:0 0 3 * * ?}
canonbridge.billing.monthly-invoice-cron=${MONTHLY_INVOICE_CRON:0 0 4 1 * ?}

# Logging
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.level=INFO
%dev.quarkus.log.category."com.canonbridge".level=DEBUG
%prod.quarkus.log.console.json=true

# OpenAPI
quarkus.smallrye-openapi.info-title=CanonBridge Billing Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Internal billing, subscription, and usage metering service

# Health
quarkus.smallrye-health.root-path=/health

# OpenTelemetry (X-Y3)
quarkus.otel.enabled=${OTEL_ENABLED:false}
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.exporter.otlp.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:grpc}
quarkus.otel.resource.attributes=service.name=${quarkus.application.name},deployment.environment=${CANONBRIDGE_ENVIRONMENT:development}
%prod.quarkus.otel.enabled=${OTEL_ENABLED:true}
%dev.quarkus.otel.enabled=false
%test.quarkus.otel.enabled=false

# JWT (for internal service auth, not user-facing)
canonbridge.jwt.secret=${JWT_SECRET_KEY:billing-service-dev-secret}
canonbridge.billing.internal-service-secret=${BILLING_INTERNAL_SECRET:billing-internal-dev-secret}
%prod.canonbridge.jwt.secret=${JWT_SECRET_KEY}
%prod.canonbridge.billing.internal-service-secret=${BILLING_INTERNAL_SECRET}

# Email
canonbridge.email.enabled=${EMAIL_ENABLED:false}
canonbridge.email.from=${EMAIL_FROM:billing@canonbridge.io}

# =========================================================================
# Security Configuration
# =========================================================================

# Authentication
canonbridge.billing.auth.enabled=${BILLING_AUTH_ENABLED:true}
canonbridge.billing.api-keys=${BILLING_API_KEYS:dev-billing-key}
canonbridge.billing.internal-service-secret=${BILLING_INTERNAL_SERVICE_SECRET:}

# JWT (shared secret with mapping-studio-api for local JWT validation)
canonbridge.jwt.secret=${JWT_SECRET_KEY:}

# Security environment (used by SecurityConfigurationValidator)
canonbridge.security.environment=${CANONBRIDGE_ENVIRONMENT:development}

# CORS prod override (B-Y3 fix)
%prod.quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS}
