version: '3.8'

services:
  # Kafka with KRaft (no Zookeeper needed)
  kafka:
    image: apache/kafka:3.7.0
    container_name: canonbridge-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - canonbridge-network

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: canonbridge-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/init-kafka.sh:/init-kafka.sh:ro
    entrypoint: ["/bin/bash", "/init-kafka.sh"]
    environment:
      KAFKA_BROKER: kafka:9092
    networks:
      - canonbridge-network
    restart: "no"

  wiremock:
    image: wiremock/wiremock:3.9.1
    container_name: canonbridge-wiremock
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro
    command: ["--global-response-templating", "--verbose"]
    networks:
      - canonbridge-network

  # CanonBridge Mock Service (All-in-one)
  canonbridge-mock:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: canonbridge-mock
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYFLEX_API_KEY: demo-api-key-12345
      SHOPMAX_CLIENT_ID: shopmax-demo-client
      SHOPMAX_CLIENT_SECRET: shopmax-demo-secret
      FASTCARGO_USERNAME: fastcargo-demo
      FASTCARGO_PASSWORD: fastcargo-secret
      WEBHOOK_STORAGE_DIR: /tmp/webhooks
      FASTCARGO_SERVICE_URL: http://canonbridge-mock:8080
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - canonbridge-network
    volumes:
      - webhook-data:/tmp/webhooks

volumes:
  kafka-data:
    driver: local
  webhook-data:
    driver: local

networks:
  canonbridge-network:
    driver: bridge
