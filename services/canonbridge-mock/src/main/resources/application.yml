server:
  port: 8080

spring:
  application:
    name: canonbridge-mock
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: canonbridge-mock-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Mock Configuration
mock:
  tenant-id: ${MOCK_TENANT_ID:tenant-acme}
  payflex:
    api-key: ${PAYFLEX_API_KEY:demo-api-key-12345}
  shopmax:
    client-id: ${SHOPMAX_CLIENT_ID:shopmax-demo-client}
    client-secret: ${SHOPMAX_CLIENT_SECRET:shopmax-demo-secret}
    token-expiry-seconds: 3600
    default-scope: ${SHOPMAX_DEFAULT_SCOPE:read:orders write:orders graphql:query grpc:profile}
  fastcargo:
    username: ${FASTCARGO_USERNAME:fastcargo-demo}
    password: ${FASTCARGO_PASSWORD:fastcargo-secret}
    service-url: ${FASTCARGO_SERVICE_URL:http://localhost:8080}
  webhook:
    storage-dir: ${WEBHOOK_STORAGE_DIR:/tmp/webhooks}
    api-key: ${WEBHOOK_API_KEY:payflex-secret-key}
  kafka:
    topics:
      payflex-raw: partner.payflex.raw
      shopmax-raw: partner.shopmax.raw
      cargo-updates: cargo.updates
      retry-demo: canonbridge.retry.demo
      dlq-demo: canonbridge.dlq.demo
    event-generator:
      enabled: true
      shopmax-interval-seconds: 30
      cargo-interval-seconds: 120

logging:
  level:
    root: INFO
    com.canonbridge: DEBUG
    org.apache.kafka: WARN
