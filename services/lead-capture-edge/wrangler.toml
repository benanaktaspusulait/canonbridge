name = "lead-capture-edge"
main = "src/index.ts"
compatibility_date = "2024-05-01"

[vars]
ALLOWED_ORIGINS = "https://canonbridge.io,https://www.canonbridge.io"
MAX_BODY_BYTES = "16384"
RATE_LIMIT_MAX_REQUESTS = "5"
RATE_LIMIT_WINDOW_SECONDS = "60"

