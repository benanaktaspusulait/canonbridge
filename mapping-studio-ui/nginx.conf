worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # [M8] Removed deprecated X-XSS-Protection header (harmful in old browsers, ignored in modern ones)
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # [M4] Removed localhost references from CSP
    # [M7] Removed 'unsafe-inline' from style-src (use nonce when needed)
    # [H1-partial] Removed 'unsafe-inline' from script-src — use nonce-based CSP
    # NOTE: The nonce value should be injected per-request by a reverse proxy or
    # templating layer in production. For now we allow 'self' only + sha256 for
    # the inline dark-mode script in index.html.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-0/ER3eKBN9GDs7WLYLoIbB3rGlOE1OELgCbGKsABt1k='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-src 'self'; frame-ancestors 'self'" always;

    server {
        listen 80;
        listen [::]:80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API proxy
        location /api/ {
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $backend "http://mapping-studio-api:8080";
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # WebSocket support for /api/notifications/ws
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # [M5] env.js must never be cached — it's rewritten on every container start
        location = /env.js {
            add_header Cache-Control "no-store";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Static files with caching (excluding env.js handled above)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Angular routing - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            # Re-add security headers (nginx drops parent headers when child defines add_header)
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-0/ER3eKBN9GDs7WLYLoIbB3rGlOE1OELgCbGKsABt1k='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-src 'self'; frame-ancestors 'self'" always;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
