<div class="app-layout" [class.sidebar-collapsed]="sidebarCollapsed()">
  <app-sidebar [collapsed]="sidebarCollapsed()" />
  <div class="main-area">
    <app-topbar (toggleSidebar)="toggleSidebar()" />
    <div class="demo-environment-banner" role="status">
      <i class="pi pi-flask" aria-hidden="true"></i>
      <span>
        <strong>{{ 'layout.demoBanner.strong' | i18n }}</strong>
        {{ 'layout.demoBanner.text' | i18n }}
      </span>
    </div>
    <main class="page-content">
      <router-outlet />
    </main>
  </div>
</div>
