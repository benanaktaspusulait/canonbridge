<header class="topbar">
  <div class="topbar-left">
    <p-button
      icon="pi pi-bars"
      variant="text"
      severity="secondary"
      (onClick)="toggleSidebar.emit()"
      [pTooltip]="'topbar.toggleSidebar' | i18n"
      tooltipPosition="bottom" />
  </div>

  <div class="topbar-right">
    <span class="env-chip" [attr.title]="'topbar.demoTitle' | i18n">{{ 'topbar.demo' | i18n }}</span>

    <p-button
      [icon]="theme.darkMode() ? 'pi pi-sun' : 'pi pi-moon'"
      variant="text"
      severity="secondary"
      (onClick)="toggleTheme()"
      [pTooltip]="theme.darkMode() ? ('topbar.lightMode' | i18n) : ('topbar.darkMode' | i18n)"
      tooltipPosition="bottom" />

    <div class="lang-wrap">
      <label class="sr-only" for="lang-select">{{ 'topbar.language' | i18n }}</label>
      <p-select
        inputId="lang-select"
        [options]="langOptions"
        optionLabel="label"
        optionValue="value"
        [ngModel]="i18n.lang()"
        (ngModelChange)="onLangChange($event)"
        styleClass="lang-select" />
    </div>

    <p-button
      icon="pi pi-bell"
      variant="text"
      severity="secondary"
      [pTooltip]="'topbar.notifications' | i18n"
      tooltipPosition="bottom"
      pBadge
      value="3"
      badgeSeverity="danger" />

    <p-button
      icon="pi pi-question-circle"
      variant="text"
      severity="secondary"
      [pTooltip]="'topbar.documentation' | i18n"
      tooltipPosition="bottom" />

    <div class="user-menu" (click)="userMenu.toggle($event)">
      <p-avatar
        [label]="auth.currentUser()?.avatarInitials ?? 'U'"
        shape="circle"
        styleClass="avatar" />
      <div class="user-info">
        <span class="user-name">{{ auth.currentUser()?.name }}</span>
        <span class="user-tenant">{{ auth.currentUser()?.tenantName }}</span>
      </div>
      <i class="pi pi-chevron-down chevron"></i>
    </div>

    <p-menu #userMenu [model]="userMenuItems" [popup]="true" />
  </div>
</header>
