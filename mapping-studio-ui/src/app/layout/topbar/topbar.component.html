<header class="topbar">
  <!-- Left -->
  <div class="topbar-left">
    <p-button
      icon="pi pi-bars"
      variant="text"
      severity="secondary"
      (onClick)="toggleSidebar.emit()"
      pTooltip="Toggle sidebar"
      tooltipPosition="bottom" />
  </div>

  <!-- Right -->
  <div class="topbar-right">
    <span class="env-chip" title="No live APIs are called in this build">Demo</span>

    <!-- Notifications -->
    <p-button
      icon="pi pi-bell"
      variant="text"
      severity="secondary"
      pTooltip="Notifications"
      tooltipPosition="bottom"
      pBadge
      value="3"
      badgeSeverity="danger" />

    <!-- Help -->
    <p-button
      icon="pi pi-question-circle"
      variant="text"
      severity="secondary"
      pTooltip="Documentation"
      tooltipPosition="bottom" />

    <!-- User menu -->
    <div class="user-menu" (click)="userMenu.toggle($event)">
      <p-avatar
        [label]="auth.currentUser()?.avatarInitials ?? 'U'"
        shape="circle"
        styleClass="avatar" />
      <div class="user-info">
        <span class="user-name">{{ auth.currentUser()?.name }}</span>
        <span class="user-tenant">{{ auth.currentUser()?.tenantName }}</span>
      </div>
      <i class="pi pi-chevron-down chevron"></i>
    </div>

    <p-menu #userMenu [model]="userMenuItems" [popup]="true" />

  </div>
</header>
