<p-toolbar styleClass="layout-toolbar border-none border-bottom-1 surface-border border-round-none">
  <ng-template pTemplate="start">
    <div class="flex align-items-center gap-2">
      <p-button
        icon="pi pi-bars"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        (onClick)="toggleSidebar.emit()"
        [pTooltip]="'topbar.toggleSidebar' | i18n"
        tooltipPosition="bottom" />
      <div class="layout-topbar-heading hidden md:flex flex-column">
        <span class="layout-topbar-product">CanonBridge</span>
        <span class="layout-topbar-context text-xs text-color-secondary font-medium">{{ 'sidebar.logoSub' | i18n }}</span>
      </div>
    </div>
  </ng-template>

  <ng-template pTemplate="end">
    <div class="flex align-items-center flex-wrap gap-1 md:gap-2">
      <p-tag [value]="'topbar.demo' | i18n" severity="warn" [rounded]="true" />
      <p-button
        [icon]="theme.darkMode() ? 'pi pi-sun' : 'pi pi-moon'"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        (onClick)="toggleTheme()"
        [pTooltip]="theme.darkMode() ? ('topbar.lightMode' | i18n) : ('topbar.darkMode' | i18n)"
        tooltipPosition="bottom" />

      <div class="lang-wrap">
        <label class="sr-only" for="lang-select">{{ 'topbar.language' | i18n }}</label>
        <p-select
          inputId="lang-select"
          [options]="langOptions"
          optionLabel="label"
          optionValue="value"
          [ngModel]="i18n.lang()"
          (ngModelChange)="onLangChange($event)"
          styleClass="lang-select" />
      </div>

      <p-button
        icon="pi pi-bell"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        [pTooltip]="'topbar.notifications' | i18n"
        tooltipPosition="bottom"
        pBadge
        value="3"
        badgeSeverity="danger" />

      <p-button
        icon="pi pi-question-circle"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        [pTooltip]="'topbar.documentation' | i18n"
        tooltipPosition="bottom" />

      <div class="user-menu-trigger flex align-items-center gap-2" (click)="userMenu.toggle($event)">
        <p-avatar
          [label]="auth.currentUser()?.avatarInitials ?? 'U'"
          shape="circle"
          styleClass="layout-avatar" />
        <i class="pi pi-chevron-down text-xs text-color-secondary hidden lg:inline"></i>
      </div>

      <p-menu #userMenu [model]="userMenuItems" [popup]="true" />
    </div>
  </ng-template>
</p-toolbar>
