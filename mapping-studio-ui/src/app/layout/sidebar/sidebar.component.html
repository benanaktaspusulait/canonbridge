<aside class="layout-sidebar" [class.layout-sidebar-collapsed]="collapsed">
  <div class="layout-sidebar-header">
    <div class="layout-sidebar-brand">
      <div class="layout-sidebar-logo">
        <i class="pi pi-sitemap"></i>
      </div>
      @if (!collapsed) {
        <div class="layout-sidebar-titles">
          <span class="layout-sidebar-title">CanonBridge</span>
          <span class="layout-sidebar-sub">{{ 'sidebar.logoSub' | i18n }}</span>
        </div>
      }
    </div>
  </div>

  <p-divider styleClass="m-0" />

  @if (!collapsed) {
    <div class="layout-sidebar-menu">
      <p-scrollPanel [style]="{ width: '100%', height: '100%' }" styleClass="layout-sidebar-scroll">
        <p-panelmenu [model]="panelModel()" styleClass="layout-panelmenu w-full border-none" />
      </p-scrollPanel>
    </div>
  } @else {
    <div class="layout-sidebar-icons">
      @for (item of iconNavItems; track item.route) {
        <p-button
          [routerLink]="item.route"
          [icon]="item.icon"
          [rounded]="true"
          [text]="true"
          severity="secondary"
          [pTooltip]="item.labelKey | i18n"
          tooltipPosition="right"
          styleClass="layout-sidebar-icon-btn w-full"
          routerLinkActive="layout-sidebar-icon-active" />
      }
    </div>
  }
</aside>
