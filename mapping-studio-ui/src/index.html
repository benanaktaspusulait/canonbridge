<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CanonBridge — Mapping Studio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CanonBridge Mapping Studio — visual ETL mapping configuration and management platform">
  <meta name="theme-color" content="#0f766e">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    (function () {
      try {
        var s = localStorage.getItem('canonbridge.darkMode');
        var dark = s === '1' || (s !== '0' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark-mode');
      } catch (e) {}
    })();
  </script>
  <script src="env.js"></script>
</head>
<body>
  <noscript>CanonBridge Mapping Studio requires JavaScript to run. Please enable it in your browser settings.</noscript>
  <app-root></app-root>
</body>
</html>
