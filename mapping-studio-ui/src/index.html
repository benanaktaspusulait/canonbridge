<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CanonBridge — Mapping Studio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CanonBridge Mapping Studio — visual ETL mapping configuration and management platform">
  <meta name="theme-color" content="#0f766e">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <!-- [M9] Fonts are now self-hosted — no external preconnect needed -->
  <!-- [L8] Inline script for dark-mode FOUC prevention.
       When nonce-based CSP is deployed, add the nonce attribute here. -->
  <script>
    (function () {
      try {
        var s = localStorage.getItem('canonbridge.darkMode');
        var dark = s === '1' || (s !== '0' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark-mode');
      } catch (e) {}
    })();
  </script>
  <script src="env.js"></script>
</head>
<body>
  <noscript>CanonBridge Mapping Studio requires JavaScript to run. Please enable it in your browser settings.</noscript>
  <app-root></app-root>
</body>
</html>
