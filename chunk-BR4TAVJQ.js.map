<app-skip-links />
<app-keyboard-shortcuts-dialog />
<div class="layout-wrapper" [class.layout-sidebar-collapsed]="sidebarCollapsed()">
  <app-sidebar [collapsed]="sidebarCollapsed()" />
  <div class="layout-main">
    <app-topbar (toggleSidebar)="toggleSidebar()" />
    @if (demoModeEnabled) {
      <p-message
        severity="warn"
        [text]="demoBannerText()"
        [closable]="false"
        styleClass="layout-demo-alert"
        role="alert"
        aria-live="polite" />
    }
    <main id="main-content" class="layout-content" role="main" tabindex="-1">
      <router-outlet />
    </main>
  </div>
</div>
