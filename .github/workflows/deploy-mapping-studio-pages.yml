name: Deploy Mapping Studio to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - "mapping-studio-ui/**"
      - ".github/workflows/deploy-mapping-studio-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mapping-studio-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Publish Mapping Studio
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mapping-studio-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build static app
        run: npm run build:dev -- --base-href /canonbridge/

      - name: Add SPA fallback
        run: |
          cp dist/mapping-studio-ui/browser/index.html dist/mapping-studio-ui/browser/404.html
          touch dist/mapping-studio-ui/browser/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: mapping-studio-ui/dist/mapping-studio-ui/browser
          force_orphan: true
