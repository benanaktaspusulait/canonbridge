name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  schema-compatibility:
    name: Schema Compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install planning test dependencies
        run: npm install --no-package-lock

      - name: Validate JSON schemas
        run: npm run test:schema-compatibility

  mapping-fixtures:
    name: Mapping Fixture Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install planning test dependencies
        run: npm install --no-package-lock

      - name: Run mapping fixture tests
        run: npm run test:mapping-fixtures

  docker-compose-config:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet

  shell-scripts:
    name: Shell Script Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell scripts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t scripts < <(find scripts docker -type f -name '*.sh' | sort)
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi
          bash -n "${scripts[@]}"

  service-placeholders:
    name: Service Implementation Placeholders
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Report implementation status
        run: |
          test -d schemas
          test -d partners
          test -d src
          test -d test
          echo "Planning assets are present. Runtime service jobs should be added when service directories are implemented."
