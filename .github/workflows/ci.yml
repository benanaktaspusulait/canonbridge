name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ============================================================================
  # ACCEPTANCE COVERAGE GATE
  # ============================================================================
  acceptance-coverage:
    name: No-Code Acceptance Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify no-code acceptance coverage
        run: node scripts/no-code-acceptance-coverage.mjs --strict --markdown

  # ============================================================================
  # BACKEND: Mapping Studio API (Java/Quarkus)
  # ============================================================================
  backend-api:
    name: Backend API (Quarkus)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/mapping-studio-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build & Test
        run: mvn clean verify -B

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: services/mapping-studio-api/target/site/jacoco/
          retention-days: 14

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_PREFIX }}/mapping-studio-api:${{ github.sha }} .

      - name: Push image (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.IMAGE_PREFIX }}/mapping-studio-api:${{ github.sha }}
          docker tag ${{ env.IMAGE_PREFIX }}/mapping-studio-api:${{ github.sha }} ${{ env.IMAGE_PREFIX }}/mapping-studio-api:latest
          docker push ${{ env.IMAGE_PREFIX }}/mapping-studio-api:latest

  # ============================================================================
  # BACKEND: Webhook Receiver (Java/Quarkus)
  # ============================================================================
  backend-webhook:
    name: Webhook Receiver (Quarkus)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/webhook-receiver
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build & Test
        run: mvn clean verify -B

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_PREFIX }}/webhook-receiver:${{ github.sha }} .

      - name: Push image (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.IMAGE_PREFIX }}/webhook-receiver:${{ github.sha }}

  # ============================================================================
  # BACKEND: Billing Service (Java/Quarkus)
  # ============================================================================
  backend-billing:
    name: Billing Service (Quarkus)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/billing-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build & Test
        run: mvn clean verify -B

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_PREFIX }}/billing-service:${{ github.sha }} .

      - name: Push image (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.IMAGE_PREFIX }}/billing-service:${{ github.sha }}

  # ============================================================================
  # TRANSFORMER SERVICE (Node.js/Fastify)
  # ============================================================================
  transformer:
    name: Transformer (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/transformer
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_PREFIX }}/transformer:${{ github.sha }} .

      - name: Push image (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.IMAGE_PREFIX }}/transformer:${{ github.sha }}

  # ============================================================================
  # FRONTEND: Mapping Studio UI (Angular)
  # ============================================================================
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mapping-studio-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test -- --run

      - name: Build (production)
        run: npx ng build --configuration=production

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_PREFIX }}/mapping-studio-ui:${{ github.sha }} .

      - name: Push image (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.IMAGE_PREFIX }}/mapping-studio-ui:${{ github.sha }}

  # ============================================================================
  # MARKETING WEBSITE (Next.js)
  # ============================================================================
  website:
    name: Website (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Check brand token sync
        run: npm run tokens:check

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser E2E and accessibility
        run: npm run test:e2e

  # ============================================================================
  # MOCK SERVICE (Spring Boot)
  # ============================================================================
  mock-service:
    name: Mock Service (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/canonbridge-mock
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests -B

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_PREFIX }}/canonbridge-mock:${{ github.sha }} .

  # ============================================================================
  # LIVE PROTOCOL E2E: 10 mock-backed external systems
  # ============================================================================
  mock-protocol-e2e:
    name: Mock Protocol E2E (Docker)
    runs-on: ubuntu-latest
    needs: [mock-service]
    defaults:
      run:
        working-directory: services/canonbridge-mock
    env:
      CANONBRIDGE_PROTOCOL_E2E: "true"
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Docker daemon
        run: docker info

      - name: Run live protocol E2E
        run: |
          mvn -Ddocker.host=unix:///var/run/docker.sock \
              -Dapi.version=1.44 \
              -Dtest=ProtocolDockerE2ETest \
              test -B

  # ============================================================================
  # INTEGRATION TESTS
  # ============================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-api, transformer, backend-webhook, backend-billing]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          POSTGRES_PASSWORD=ci_test_password
          CANONBRIDGE_API_KEYS=ci-test-key
          CANONBRIDGE_CREDENTIAL_ENCRYPTION_KEY=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          GF_SECURITY_ADMIN_PASSWORD=admin
          EOF

      - name: Start services
        run: |
          docker compose up -d postgres kafka zookeeper redis
          sleep 15
          docker compose up -d mapping-studio-api transformer webhook-receiver canonbridge-mock
          sleep 30

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8082/health > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 5
          done

      - name: Run API smoke tests
        run: |
          # Health check
          curl -sf http://localhost:8082/health | jq .status
          
          # List mappings
          curl -sf -H "X-Tenant-Id: tenant-acme" http://localhost:8082/api/mapping-drafts | jq length
          
          # Metrics endpoint
          curl -sf http://localhost:8082/metrics > /tmp/mapping-studio-api.metrics
          test -s /tmp/mapping-studio-api.metrics
          
          echo "✅ All smoke tests passed"

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ============================================================================
  # DOCKER COMPOSE VALIDATION
  # ============================================================================
  compose-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config --quiet

  # ============================================================================
  # DATABASE MIGRATION CHECK
  # ============================================================================
  migration-check:
    name: DB Migration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check migration file naming
        run: |
          cd services/mapping-studio-api/src/main/resources/db/migration
          # Verify all files follow V{N}__ pattern
          for f in *.sql; do
            if ! echo "$f" | grep -qE '^V[0-9]+__'; then
              echo "ERROR: Invalid migration filename: $f"
              exit 1
            fi
          done
          echo "✅ All migration files follow naming convention"
          echo "Total migrations: $(ls V*.sql | wc -l)"
