name: CD Pipeline

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ============================================================================
  # BUILD ALL IMAGES
  # ============================================================================
  build:
    name: Build Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: mapping-studio-api, path: services/mapping-studio-api, java: true }
          - { name: webhook-receiver, path: services/webhook-receiver, java: true }
          - { name: transformer, path: services/transformer, java: false }
          - { name: website, path: website, java: false }
          - { name: mapping-studio-ui, path: mapping-studio-ui, java: false }
          - { name: canonbridge-mock, path: services/canonbridge-mock, java: true, exclude-production: true }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        if: matrix.service.java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Node.js
        if: ${{ !matrix.service.java }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Java service
        if: matrix.service.java
        working-directory: ${{ matrix.service.path }}
        run: mvn clean package -DskipTests -B

      - name: Build Node service
        if: ${{ !matrix.service.java && matrix.service.name == 'transformer' }}
        working-directory: ${{ matrix.service.path }}
        run: |
          npm ci
          npm run build --if-present

      - name: Test and build website
        if: matrix.service.name == 'website'
        working-directory: ${{ matrix.service.path }}
        run: |
          npm ci
          npm test
          npm run tokens:check
          npm run build

      - name: Build Angular app
        if: matrix.service.name == 'mapping-studio-ui'
        working-directory: ${{ matrix.service.path }}
        run: |
          npm ci
          npx ng build --configuration=production

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ !(matrix.service.exclude-production && startsWith(github.ref, 'refs/tags/v')) }}
        working-directory: ${{ matrix.service.path }}
        run: |
          IMAGE=${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  # ============================================================================
  # DEPLOY TO STAGING
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: ${{ vars.EKS_CLUSTER_STAGING != '' }}
    environment:
      name: staging
      url: https://staging.canonbridge.io
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.28.0'

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_STAGING }} --region ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Deploy services
        run: |
          export IMAGE_TAG=${{ github.sha }}
          envsubst < k8s/staging/deployment.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/mapping-studio-api -n canonbridge --timeout=5m
          kubectl rollout status deployment/transformer -n canonbridge --timeout=5m
          kubectl rollout status deployment/webhook-receiver -n canonbridge --timeout=5m

      - name: Smoke tests
        run: |
          API_URL=$(kubectl get svc mapping-studio-api -n canonbridge -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -sf "http://$API_URL:8080/health" | jq .status

  # ============================================================================
  # DEPLOY TO PRODUCTION (tag only)
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: ${{ startsWith(github.ref, 'refs/tags/v') && vars.EKS_CLUSTER_PRODUCTION != '' }}
    environment:
      name: production
      url: https://canonbridge.io
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.28.0'

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_PRODUCTION }} --region ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Canary deploy (10%)
        run: |
          export IMAGE_TAG=${{ github.sha }}
          envsubst < k8s/production/canary.yaml | kubectl apply -f -
          sleep 120

      - name: Validate canary
        run: |
          ERROR_RATE=$(curl -s "http://prometheus:9090/api/v1/query?query=rate(proxy_errors_total[5m])" | jq -r '.data.result[0].value[1] // "0"')
          if [ "$(echo "$ERROR_RATE > 0.05" | bc -l)" = "1" ]; then
            echo "❌ Canary error rate too high: $ERROR_RATE"
            kubectl rollout undo deployment/mapping-studio-api -n canonbridge
            exit 1
          fi
          echo "✅ Canary healthy (error rate: $ERROR_RATE)"

      - name: Full rollout
        run: |
          export IMAGE_TAG=${{ github.sha }}
          envsubst < k8s/production/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/mapping-studio-api -n canonbridge --timeout=10m
          kubectl rollout status deployment/transformer -n canonbridge --timeout=10m

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true

      - name: Notify
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deploy: ${{ github.ref_name }} - ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
