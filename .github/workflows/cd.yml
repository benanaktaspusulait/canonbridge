name: CD Pipeline

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  KUBECTL_VERSION: '1.28.0'
  HELM_VERSION: '3.13.0'

jobs:
  # ============================================================================
  # DEPLOY TO STAGING
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.etlsolutions.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name etl-solutions-staging --region us-east-1

      - name: Deploy to staging
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/postgres-statefulset.yaml
          kubectl apply -f k8s/kafka-statefulset.yaml
          kubectl apply -f k8s/transformer-deployment.yaml
          kubectl apply -f k8s/business-service-deployment.yaml

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/transformer -n etl-solutions --timeout=5m
          kubectl rollout status deployment/business-service -n etl-solutions --timeout=5m

      - name: Run smoke tests
        run: |
          kubectl run smoke-test --image=curlimages/curl:latest --rm -i --restart=Never -- \
            curl -f http://transformer-service:3000/health/ready

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Deployed to Staging'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  # ============================================================================
  # DEPLOY TO PRODUCTION
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://etlsolutions.com
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name etl-solutions-production --region us-east-1

      - name: Canary deployment (5%)
        run: |
          kubectl set image deployment/transformer transformer=etlsolutions/transformer:${{ github.ref_name }} -n etl-solutions
          kubectl patch deployment transformer -n etl-solutions -p '{"spec":{"replicas":1}}'
          sleep 60

      - name: Check canary metrics
        run: |
          # Check error rate
          ERROR_RATE=$(kubectl exec -n monitoring prometheus-0 -- \
            promtool query instant 'rate(http_requests_total{status=~"5..",job="transformer"}[5m])' | \
            jq -r '.data.result[0].value[1]')
          
          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "Error rate too high: $ERROR_RATE"
            exit 1
          fi

      - name: Scale to 25%
        run: |
          kubectl patch deployment transformer -n etl-solutions -p '{"spec":{"replicas":3}}'
          sleep 120

      - name: Check metrics (25%)
        run: |
          # Check error rate and latency
          ./scripts/check-metrics.sh

      - name: Scale to 50%
        run: |
          kubectl patch deployment transformer -n etl-solutions -p '{"spec":{"replicas":6}}'
          sleep 120

      - name: Check metrics (50%)
        run: |
          ./scripts/check-metrics.sh

      - name: Scale to 100%
        run: |
          kubectl patch deployment transformer -n etl-solutions -p '{"spec":{"replicas":12}}'
          kubectl rollout status deployment/transformer -n etl-solutions --timeout=10m

      - name: Deploy business service
        run: |
          kubectl set image deployment/business-service business-service=etlsolutions/business-service:${{ github.ref_name }} -n etl-solutions
          kubectl rollout status deployment/business-service -n etl-solutions --timeout=10m

      - name: Run smoke tests
        run: |
          ./scripts/smoke-tests.sh production

      - name: Create GitHub release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Deployed to Production: ${{ github.ref_name }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  # ============================================================================
  # ROLLBACK
  # ============================================================================
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name etl-solutions-production --region us-east-1

      - name: Rollback deployment
        run: |
          kubectl rollout undo deployment/transformer -n etl-solutions
          kubectl rollout undo deployment/business-service -n etl-solutions
          kubectl rollout status deployment/transformer -n etl-solutions --timeout=5m
          kubectl rollout status deployment/business-service -n etl-solutions --timeout=5m

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: 'failure'
          text: 'Production deployment failed - Rolled back'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
