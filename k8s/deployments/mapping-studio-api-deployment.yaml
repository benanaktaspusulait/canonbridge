apiVersion: apps/v1
kind: Deployment
metadata:
  name: mapping-studio-api
  namespace: canonbridge
  labels:
    app: mapping-studio-api
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mapping-studio-api
  template:
    metadata:
      labels:
        app: mapping-studio-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: canonbridge-service-account
      # mapping-studio-api is the migration OWNER — no initContainer needed
      # It runs Flyway on startup (migrate-at-start=true)
      containers:
      - name: mapping-studio-api
        image: canonbridge/mapping-studio-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: REACTIVE_DB_URL
        - name: JDBC_DB_URL
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: JDBC_DB_URL
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: DB_PASSWORD
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-secrets
              key: REDIS_URL
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: kafka-config
              key: BOOTSTRAP_SERVERS
        - name: KAFKA_SECURITY_PROTOCOL
          value: "SASL_PLAINTEXT"
        - name: KAFKA_SASL_MECHANISM
          value: "SCRAM-SHA-256"
        - name: KAFKA_SASL_JAAS_CONFIG
          valueFrom:
            secretKeyRef:
              name: kafka-secrets
              key: MAPPING_STUDIO_API_JAAS_CONFIG
        - name: CANONBRIDGE_AUTH_ENABLED
          value: "true"
        - name: CANONBRIDGE_API_KEYS
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: API_KEYS
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: JWT_SECRET_KEY
        - name: BILLING_INTERNAL_SERVICE_SECRET
          valueFrom:
            secretKeyRef:
              name: billing-secrets
              key: INTERNAL_SERVICE_SECRET
        - name: CANONBRIDGE_CREDENTIAL_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: CREDENTIAL_ENCRYPTION_KEY
        - name: OIDC_ENABLED
          value: "true"
        - name: OIDC_SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: auth-config
              key: OIDC_SERVER_URL
        - name: OIDC_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: auth-config
              key: OIDC_CLIENT_ID
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: OIDC_CLIENT_SECRET
        - name: CORS_ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CORS_ALLOWED_ORIGINS
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector-service:4317"
        - name: SECURITY_FAIL_ON_INSECURE_DEFAULTS
          value: "true"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: mapping-studio-api-service
  namespace: canonbridge
  labels:
    app: mapping-studio-api
spec:
  type: ClusterIP
  selector:
    app: mapping-studio-api
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
