apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: canonbridge
  labels:
    app: billing-service
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/q/metrics"
    spec:
      serviceAccountName: canonbridge-service-account
      # B-Y4 FIX: Wait for mapping-studio-api to complete migrations before starting
      initContainers:
      - name: wait-for-migrations
        image: busybox:1.36
        command: ['sh', '-c']
        args:
        - |
          echo "Waiting for mapping-studio-api to be ready (migrations complete)..."
          until wget -qO- http://mapping-studio-api-service:8080/health/ready 2>/dev/null | grep -q "UP"; do
            echo "mapping-studio-api not ready yet, waiting 5s..."
            sleep 5
          done
          echo "mapping-studio-api is ready — database migrations complete."
      containers:
      - name: billing-service
        image: canonbridge/billing-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: CANONBRIDGE_ENVIRONMENT
          value: "production"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: DB_NAME
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: DB_PASSWORD
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-secrets
              key: REDIS_URL
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: kafka-config
              key: BOOTSTRAP_SERVERS
        - name: KAFKA_SECURITY_PROTOCOL
          value: "SASL_PLAINTEXT"
        - name: KAFKA_SASL_MECHANISM
          value: "SCRAM-SHA-256"
        - name: KAFKA_SASL_JAAS_CONFIG
          valueFrom:
            secretKeyRef:
              name: kafka-secrets
              key: BILLING_SERVICE_JAAS_CONFIG
        - name: BILLING_INTERNAL_SERVICE_SECRET
          valueFrom:
            secretKeyRef:
              name: billing-secrets
              key: INTERNAL_SERVICE_SECRET
        - name: BILLING_API_KEYS
          valueFrom:
            secretKeyRef:
              name: billing-secrets
              key: API_KEYS
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: JWT_SECRET_KEY
        - name: PADDLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: paddle-secrets
              key: API_KEY
        - name: PADDLE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: paddle-secrets
              key: WEBHOOK_SECRET
        - name: PADDLE_ENVIRONMENT
          value: "production"
        - name: CORS_ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CORS_ALLOWED_ORIGINS
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector-service:4317"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
