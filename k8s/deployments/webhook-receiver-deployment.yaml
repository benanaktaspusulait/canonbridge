apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  namespace: canonbridge
  labels:
    app: webhook-receiver
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: webhook-receiver
  template:
    metadata:
      labels:
        app: webhook-receiver
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/q/metrics"
    spec:
      serviceAccountName: canonbridge-service-account
      # B-Y4 FIX: Wait for mapping-studio-api to complete migrations before starting
      initContainers:
      - name: wait-for-migrations
        image: busybox:1.36
        command: ['sh', '-c']
        args:
        - |
          echo "Waiting for mapping-studio-api to be ready (migrations complete)..."
          until wget -qO- http://mapping-studio-api-service:8080/health/ready 2>/dev/null | grep -q "UP"; do
            echo "mapping-studio-api not ready yet, waiting 5s..."
            sleep 5
          done
          echo "mapping-studio-api is ready — database migrations complete."
      containers:
      - name: webhook-receiver
        image: canonbridge/webhook-receiver:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8082
          name: http
        env:
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: REACTIVE_DB_URL
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: DB_PASSWORD
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: kafka-config
              key: BOOTSTRAP_SERVERS
        - name: KAFKA_SECURITY_PROTOCOL
          value: "SASL_PLAINTEXT"
        - name: KAFKA_SASL_MECHANISM
          value: "SCRAM-SHA-256"
        - name: KAFKA_SASL_JAAS_CONFIG
          valueFrom:
            secretKeyRef:
              name: kafka-secrets
              key: WEBHOOK_RECEIVER_JAAS_CONFIG
        - name: WEBHOOK_RATE_LIMIT_ENABLED
          value: "true"
        - name: WEBHOOK_RATE_LIMIT_MAX_REQUESTS
          value: "100"
        - name: WEBHOOK_RATE_LIMIT_WINDOW_SECONDS
          value: "60"
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector-service:4317"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /q/health/live
            port: 8082
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
