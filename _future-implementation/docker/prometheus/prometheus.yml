global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'etl-solutions-local'
    environment: 'development'

# Alertmanager configuration (optional for local development)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
# rule_files:
#   - "alerts/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Transformer Service (Node.js + Fastify)
  - job_name: 'transformer'
    static_configs:
      - targets: ['transformer:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Business Service (Java + Quarkus)
  - job_name: 'business-service'
    static_configs:
      - targets: ['business-service:8080']
    metrics_path: '/q/metrics'
    scrape_interval: 10s

  # Frontend (React)
  - job_name: 'frontend'
    static_configs:
      - targets: ['frontend:3000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  # Kafka JMX Exporter
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9101']
    scrape_interval: 15s

  # Node Exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
